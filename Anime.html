<!-- style for showing diff anime -->
<style>    
 .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .card {
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }
    .card:hover {
      transform: scale(1.05);
    }
    img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }
  </style>
</head>
